<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Simple Website</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
      text-align:center;
    }

    .box{
      background: rgba(255,255,255,0.15);
      padding:40px;
      border-radius:20px;
      backdrop-filter: blur(10px);
      box-shadow:0 0 20px rgba(0,0,0,0.2);
    }

    h1{
      font-size:40px;
      margin-bottom:10px;
    }

    p{
      font-size:18px;
    }

    button{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      border-radius:10px;
      background:white;
      color:#0077ff;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0077ff;
      color:white;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Welcome Harsh 👋</h1>
    <p>This is my first simple website.</p>

    <button onclick="showMessage()">
      Click Me
    </button>
  </div>

  <script>
    function showMessage(){
      alert("Hello Harsh! Website working successfully 🚀");
    }
  </script>

</body>
</html>
