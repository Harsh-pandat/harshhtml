<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Customer Support</title>

<style>
body { font-family: Arial; }

#chatbox {
    width: 300px;
    height: 400px;
    border: 2px solid #333;
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #fff;
    display: flex;
    flex-direction: column;
}

#messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

#inputArea {
    display: flex;
}

#userInput {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

.bot { color: blue; margin: 5px 0; }
.user { color: black; text-align: right; margin: 5px 0; }
</style>
</head>

<body>

<div id="chatbox">
    <div id="messages"></div>
    <div id="inputArea">
        <input type="text" id="userInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    let inputBox = document.getElementById("userInput");
    let input = inputBox.value.trim();
    if (input === "") return;

    let messages = document.getElementById("messages");

    messages.innerHTML += "<div class='user'>" + input + "</div>";

    let reply = getBotReply(input);

    setTimeout(function () {
        messages.innerHTML += "<div class='bot'>" + reply + "</div>";
        messages.scrollTop = messages.scrollHeight;
    }, 500);

    inputBox.value = "";
}

function getBotReply(input) {
    input = input.toLowerCase();

    if (input.includes("hello") || input.includes("hi")) {
        return "Hello! Kaise help kar sakta hoon?";
    }
    else if (input.includes("doctor")) {
        return "Doctor consult ke liye visit kare: https://www.safehealthexperience.com";
    }
    else if (input.includes("appointment")) {
        return "Appointment book kare: https://www.safehealthexperience.com";
    }
    else {
        return "Samajh nahi aaya 😅, please website visit kare: https://www.safehealthexperience.com";
    }
}
</script>

</body>
</html>
